<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
   <script>document.documentElement.setAttribute('data-theme', 'light');</script>
   <meta charset="utf-8">
   <title>Articles — Thomas Stephen Felix</title>
   <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
   <link rel="stylesheet" href="../css/default.css">
   <link rel="stylesheet" href="../css/layout.css">
   <link rel="stylesheet" href="../css/media-queries.css">
   <link rel="stylesheet" href="../css/projects.css">
   <link rel="icon" href="../meow.svg" type="image/svg+xml">
   <style>
      .articles-header {
         background: #0b1f3a;
         padding: 52px 40px 40px;
         border-bottom: 3px solid #b87333;
      }
      .articles-header .back-nav a {
         color: #b87333;
         font: 12px 'opensans-bold', sans-serif;
         text-transform: uppercase;
         letter-spacing: 1.5px;
         text-decoration: none;
      }
      .articles-header .back-nav a:hover { color: #fff; }
      .articles-header h1 {
         font: 36px/1.1 'opensans-bold', sans-serif;
         color: #fff;
         margin: 16px 0 10px;
         letter-spacing: -0.5px;
      }
      .articles-header p {
         color: #8a9ab0;
         font: 15px/1.6 'librebaskerville-regular', serif;
         margin: 0;
         max-width: 540px;
      }

      .articles-body {
         max-width: 760px;
         margin: 0 auto;
         padding: 48px 40px 80px;
      }

      .article-card {
         border-bottom: 1px solid #e8eaee;
         padding: 32px 0;
      }
      .article-card:first-child { padding-top: 0; }
      .article-card:last-child  { border-bottom: none; }

      .article-date {
         font: 11px 'opensans-bold', sans-serif;
         color: #b87333;
         text-transform: uppercase;
         letter-spacing: 1.5px;
         margin-bottom: 8px;
      }
      .article-card h2 {
         font: 22px/1.3 'opensans-bold', sans-serif;
         color: #0b1f3a;
         margin: 0 0 10px;
      }
      .article-card h2 a {
         color: inherit;
         text-decoration: none;
      }
      .article-card h2 a:hover { color: #b87333; }
      .article-desc {
         font: 15px/1.7 'librebaskerville-regular', serif;
         color: #6a6e7a;
         margin: 0 0 14px;
      }
      .article-read-link {
         font: 12px 'opensans-bold', sans-serif;
         color: #b87333;
         text-decoration: none;
         text-transform: uppercase;
         letter-spacing: 1px;
      }
      .article-read-link:hover { color: #0b1f3a; }

      /* Coming soon */
      .coming-soon {
         text-align: center;
         padding: 80px 0 60px;
      }
      .coming-soon .cs-icon {
         font-size: 48px;
         margin-bottom: 20px;
         opacity: 0.4;
      }
      .coming-soon h2 {
         font: 22px 'opensans-bold', sans-serif;
         color: #0b1f3a;
         margin: 0 0 10px;
      }
      .coming-soon p {
         font: 15px/1.7 'librebaskerville-regular', serif;
         color: #8a9ab0;
         max-width: 360px;
         margin: 0 auto;
      }
   </style>
</head>
<body class="single-project-page">

   <div class="articles-header">
      <div class="back-nav">
         <a href="../index.html">&#8592; Back to Home</a>
      </div>
      <h1>Articles</h1>
      <p>Writing on robotics, control theory, and things I find interesting enough to put into words.</p>
   </div>

   <div class="articles-body">
      <div id="article-list"></div>
      <p id="more-soon" style="display:none; font:13px 'opensans-bold',sans-serif; color:#b87333; text-transform:uppercase; letter-spacing:1.5px; margin-top:36px;">More to come soon &hellip;</p>
   </div>

   <script>
      fetch('manifest.json')
         .then(r => r.json())
         .then(articles => {
            const container = document.getElementById('article-list');

            if (!articles.length) {
               container.innerHTML = `
                  <div class="coming-soon">
                     <div class="cs-icon">&#9998;</div>
                     <h2>Coming soon</h2>
                     <p>Nothing published yet — check back later.</p>
                  </div>`;
               return;
            }

            document.getElementById('more-soon').style.display = '';
            container.innerHTML = articles.map(a => {
               const date = new Date(a.date + 'T00:00:00');
               const formatted = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
               return `
                  <div class="article-card">
                     <div class="article-date">${formatted}</div>
                     <h2><a href="reader.html?slug=${a.slug}">${a.title}</a></h2>
                     <p class="article-desc">${a.description}</p>
                     <a class="article-read-link" href="reader.html?slug=${a.slug}">Read &rarr;</a>
                  </div>`;
            }).join('');
         })
         .catch(() => {
            document.getElementById('article-list').innerHTML = `
               <div class="coming-soon">
                  <div class="cs-icon">&#9998;</div>
                  <h2>Coming soon</h2>
                  <p>Nothing published yet — check back later.</p>
               </div>`;
         });
   </script>

   <script src="../js/jquery-1.10.2.min.js"></script>
   <script src="../js/theme.js"></script>
</body>
</html>
