<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#17222f"/>

  <defs>
    <clipPath id="face">
      <ellipse cx="32" cy="36" rx="20" ry="18"/>
    </clipPath>
  </defs>

  <!-- Ears -->
  <polygon points="11,26 17,7 27,22" fill="#e8eef4" stroke="#0b1f3a" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="15,24 17,11 24,21" fill="#4ab8d4"/>

  <polygon points="37,22 47,7 53,26" fill="#e8eef4" stroke="#0b1f3a" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="40,21 47,11 49,24" fill="#4ab8d4"/>

  <!-- Face -->
  <ellipse cx="32" cy="36" rx="20" ry="18" fill="#e8eef4" stroke="#0b1f3a" stroke-width="2"/>

  <!-- Copper visor strip -->
  <rect x="12" y="24" width="40" height="5" fill="#b87333" clip-path="url(#face)"/>

  <!-- Eyes: camera-lens style with glow -->
  <circle cx="22" cy="37" r="7"   fill="#4ab8d4"/>
  <circle cx="22" cy="37" r="5"   fill="#0b1f3a"/>
  <circle cx="22" cy="37" r="2.5" fill="#4ab8d4"/>
  <circle cx="20.5" cy="35.5" r="1.3" fill="white"/>

  <circle cx="42" cy="37" r="7"   fill="#4ab8d4"/>
  <circle cx="42" cy="37" r="5"   fill="#0b1f3a"/>
  <circle cx="42" cy="37" r="2.5" fill="#4ab8d4"/>
  <circle cx="40.5" cy="35.5" r="1.3" fill="white"/>

  <!-- Nose -->
  <ellipse cx="32" cy="44" rx="2" ry="1.5" fill="#0b1f3a"/>
</svg>
