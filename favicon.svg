<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#17222f"/>

  <defs>
    <clipPath id="bc">
      <circle cx="32" cy="44" r="19"/>
    </clipPath>
    <clipPath id="hc">
      <circle cx="34" cy="22" r="11"/>
    </clipPath>
  </defs>

  <!-- Body sphere base -->
  <circle cx="32" cy="44" r="19" fill="#e8eef2"/>

  <!-- Copper body panels -->
  <rect x="13" y="40" width="38" height="8" fill="#b87333" clip-path="url(#bc)"/>
  <circle cx="44" cy="52" r="13" fill="#b87333" clip-path="url(#bc)"/>

  <!-- Panel dividing lines -->
  <line x1="13" y1="40" x2="51" y2="40" stroke="#0b1f3a" stroke-width="1" clip-path="url(#bc)"/>
  <line x1="13" y1="48" x2="51" y2="48" stroke="#0b1f3a" stroke-width="1" clip-path="url(#bc)"/>
  <line x1="32" y1="25" x2="32" y2="63" stroke="#0b1f3a" stroke-width="0.7" clip-path="url(#bc)" opacity="0.4"/>

  <!-- Body detail: small circular panel -->
  <circle cx="23" cy="44" r="3.5" fill="#e8eef2" clip-path="url(#bc)"/>
  <circle cx="23" cy="44" r="2" fill="#0b1f3a" clip-path="url(#bc)"/>
  <circle cx="23" cy="44" r="1" fill="#b87333" clip-path="url(#bc)"/>

  <!-- Small body dot detail -->
  <circle cx="39" cy="34" r="2" fill="#0b1f3a" clip-path="url(#bc)"/>

  <!-- Body outline -->
  <circle cx="32" cy="44" r="19" fill="none" stroke="#0b1f3a" stroke-width="1.5"/>

  <!-- Head dome -->
  <circle cx="34" cy="22" r="11" fill="#e8eef2"/>
  <!-- Copper stripe on head -->
  <rect x="23" y="21" width="22" height="5" fill="#b87333" clip-path="url(#hc)"/>
  <line x1="23" y1="21" x2="45" y2="21" stroke="#0b1f3a" stroke-width="0.8" clip-path="url(#hc)"/>
  <line x1="23" y1="26" x2="45" y2="26" stroke="#0b1f3a" stroke-width="0.8" clip-path="url(#hc)"/>

  <!-- Eye (navy ring, copper iris, navy pupil, highlight) -->
  <circle cx="38" cy="16" r="4.5" fill="#0b1f3a"/>
  <circle cx="38" cy="16" r="3" fill="#b87333"/>
  <circle cx="38" cy="16" r="1.7" fill="#0b1f3a"/>
  <circle cx="37" cy="15" r="0.8" fill="#c8dff0"/>

  <!-- Head outline -->
  <circle cx="34" cy="22" r="11" fill="none" stroke="#0b1f3a" stroke-width="1.2"/>
</svg>
